apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: echo-server-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xputerax/argocd-homelab.git
    targetRevision: HEAD
    path: echo-server/overlays/prod
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
